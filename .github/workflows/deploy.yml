name: Deploy to VPS

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p /var/www
            cd /var/www
            
            # If the folder doesn't exist, clone it
            if [ ! -d "tasghor.rtsquad.com" ]; then
              git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git tasghor.rtsquad.com
            fi
            
            cd tasghor.rtsquad.com
            git config --global --add safe.directory /var/www/tasghor.rtsquad.com
            
            # Update remote with current action token to prevent auth errors
            git remote set-url origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git clean -fd
            
            # Setup Nginx if not already configured
            NGINX_CONF="/etc/nginx/sites-available/tasghor.rtsquad.com"
            if [ ! -f "$NGINX_CONF" ]; then
              echo "Creating Nginx configuration..."
              cat << 'EOF' > $NGINX_CONF
            server {
                listen 80;
                server_name tasghor.rtsquad.com;
                root /var/www/tasghor.rtsquad.com;
                index index.html index.htm index.php UIUX.html;

                location / {
                    try_files $uri $uri/ =404;
                }
            }
            EOF
              ln -sf $NGINX_CONF /etc/nginx/sites-enabled/
              nginx -t && systemctl restart nginx
              echo "Nginx configured and restarted."
            fi
