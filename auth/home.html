<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;

  /* LIGHT BACKGROUND */
  background: linear-gradient(135deg, #f9fafb, #fef2f2);
}

/* CARD */
.card {
  position: relative;
  width: 100%;
  max-width: 380px;
  padding: 40px 30px;
  border-radius: 20px;

  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(0,0,0,0.06);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9);

  text-align: center;
  color: #111827;
}

/* GLOSS EFFECT */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  border-radius: 20px;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.9),
    transparent
  );

  opacity: 0.6;
  pointer-events: none;
}

/* ICON */
.icon {
  width: 60px;
  height: 60px;
  margin: 0 auto 18px;
  border-radius: 16px;

  background: linear-gradient(135deg, #7a1028, #d61f4b);

  display: flex;
  align-items: center;
  justify-content: center;

  color: #fff;
  font-size: 24px;
  font-weight: bold;

  box-shadow:
    0 10px 25px rgba(214,31,75,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
}

/* TEXT */
.title {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 6px;
}

.subtitle {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 22px;
  line-height: 1.6;
}

/* STATUS */
.status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 50px;

  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.08);

  font-size: 13px;
  margin-bottom: 26px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px rgba(34,197,94,0.6);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;

  background: linear-gradient(135deg, #7a1028, #d61f4b);

  color: white;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;

  box-shadow:
    0 8px 20px rgba(214,31,75,0.35),
    inset 0 1px 0 rgba(255,255,255,0.3);

  transition: 0.3s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow:
    0 12px 25px rgba(214,31,75,0.45),
    inset 0 1px 0 rgba(255,255,255,0.4);
}

/* FOOTER */
.footer {
  margin-top: 14px;
  font-size: 12px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="card">

  

  <div class="title">বিডিঅ্যাপস-এ স্বাগতম</div>

  <div class="subtitle">
    আপনার প্রোফাইল<br>
    যেকোনো সময় আনসাবস্ক্রাইব করতে পারবেন
  </div>

  <div class="status">
    <span class="dot"></span>
    আপনার সাবস্ক্রিপশন চালু আছে
  </div>

  <button onclick="unsubscribe()">আনসাবস্ক্রাইব করুন</button>

  <div class="footer">আপনি যেকোনো সময় আবার সাবস্ক্রাইব করতে পারবেন</div>

</div>

<script>
async function unsubscribe() {
  const phone = localStorage.getItem("phone");

  if (!confirm("আপনি কি unsubscribe করতে চান?")) return;

  await fetch("unsubscribe.php", {
    method: "POST",
    body: new URLSearchParams({ user_mobile: phone })
  });

  localStorage.clear();
  window.location.href = "login.html";
}

if (!localStorage.getItem("isLoggedIn")) {
  window.location.href = "login.html";
}
</script>

</body>
</html>
