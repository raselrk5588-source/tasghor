<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২৯ কার্ড গেম</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👑</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== OTP Page Specific Styles ===== */

        /* Animated Gradient Background */
        body.otp-body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        body.otp-body::before,
        body.otp-body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
            animation: floatBlob 8s ease-in-out infinite alternate;
        }
        body.otp-body::before {
            width: 350px;
            height: 350px;
            background: #6c5ce7;
            top: -80px;
            left: -80px;
        }
        body.otp-body::after {
            width: 300px;
            height: 300px;
            background: #00cec9;
            bottom: -60px;
            right: -60px;
            animation-delay: 2s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 30px) scale(1.15); }
        }

        /* OTP Card */
        .otp-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 36px 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Close Button */
        .otp-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: rgba(255, 255, 255, 0.45);
            font-size: 1.2rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .otp-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Shield Icon */
        .otp-icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4); transform: scale(1); }
            50% { box-shadow: 0 8px 40px rgba(108, 92, 231, 0.6); transform: scale(1.05); }
        }

        .otp-icon-wrap i {
            font-size: 2rem;
            color: #fff;
        }

        /* Title */
        .otp-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px;
            letter-spacing: -0.3px;
        }

        /* Subtitle */
        .otp-subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.9rem;
            margin: 0 0 8px;
            line-height: 1.6;
        }

        /* Phone display */
        .otp-phone-display {
            color: #a29bfe;
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0 0 28px;
            letter-spacing: 1px;
        }

        /* OTP Inputs Container */
        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
        }

        .otp-inputs input {
            width: 46px;
            height: 54px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            caret-color: #a29bfe;
        }

        .otp-inputs input:focus {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.12);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            transform: translateY(-2px);
        }

        .otp-inputs input.filled {
            border-color: #00cec9;
            background: rgba(0, 206, 201, 0.1);
        }

        .otp-inputs input.error {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            animation: shakeInput 0.5s ease;
        }

        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* Verify Button */
        .otp-verify-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            color: #fff;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.35);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .otp-verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(108, 92, 231, 0.5);
        }

        .otp-verify-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .otp-verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Shimmer effect on button */
        .otp-verify-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: none;
        }
        .otp-verify-btn:not(:disabled):hover::after {
            animation: shimmer 0.8s ease forwards;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        /* Loader Spinner */
        .otp-loader {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .otp-loader.visible {
            display: flex;
        }
        .otp-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: #a29bfe;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Resend Section */
        .otp-resend {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
        }
        .otp-resend-link {
            color: #a29bfe;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s;
        }
        .otp-resend-link:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }
        .otp-resend-link.disabled {
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            pointer-events: none;
        }
        .otp-timer {
            color: #00cec9;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Success Animation */
        .otp-success-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }
        .otp-success-overlay.visible {
            opacity: 1;
            visibility: visible;
        }
        .otp-success-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00b894, #00cec9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 206, 201, 0.4);
            animation: successPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform: scale(0);
        }
        @keyframes successPop {
            to { transform: scale(1); }
        }
        .otp-success-circle i {
            font-size: 2.8rem;
            color: #fff;
        }

        /* Error Message */
        .otp-error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: -16px;
            margin-bottom: 16px;
            min-height: 20px;
            transition: opacity 0.3s;
            opacity: 0;
        }
        .otp-error-msg.visible {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 420px) {
            .otp-card {
                padding: 36px 24px 32px;
                margin: 16px;
            }
            .otp-inputs input {
                width: 40px;
                height: 48px;
                font-size: 1.2rem;
                border-radius: 10px;
            }
            .otp-inputs {
                gap: 6px;
            }
        }
    </style>
</head>
<body class="otp-body">

    <!-- OTP Card -->
    <div class="otp-card">
        <a href="../index.html" class="otp-close"><i class="fa-solid fa-xmark"></i></a>

        <!-- Shield Icon -->
        <div class="otp-icon-wrap">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <h1 class="otp-title">ওটিপি যাচাই করুন</h1>
        <p class="otp-subtitle">আপনার মোবাইলে পাঠানো ৬ ডিজিটের কোডটি দিন</p>
        <p class="otp-phone-display" id="phone-display"></p>

        <!-- 6 Separate OTP Input Boxes -->
        <div class="otp-inputs" id="otp-inputs">
            <input type="tel" maxlength="1" class="otp-digit" data-index="0" autocomplete="one-time-code" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-digit" data-index="1" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-digit" data-index="2" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-digit" data-index="3" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-digit" data-index="4" inputmode="numeric">
            <input type="tel" maxlength="1" class="otp-digit" data-index="5" inputmode="numeric">
        </div>

        <!-- Error Message -->
        <p class="otp-error-msg" id="error-msg"></p>

        <!-- Loader -->
        <div class="otp-loader" id="loader">
            <div class="otp-spinner"></div>
            <span>যাচাই করা হচ্ছে...</span>
        </div>

        <!-- Verify Button -->
        <button id="auth-btn" class="otp-verify-btn" onclick="verifyOtp()">
            <i class="fa-solid fa-check-circle" style="margin-right: 8px;"></i>ভেরিফাই করুন
        </button>

        <!-- Resend OTP -->
        <div class="otp-resend">
            কোড পাননি?
            <span class="otp-resend-link disabled" id="resend-link" onclick="resendOtp()">
                আবার পাঠান
            </span>
            <span class="otp-timer" id="resend-timer">(০০:৩০)</span>
        </div>
    </div>

    <!-- Success Overlay -->
    <div class="otp-success-overlay" id="success-overlay">
        <div class="otp-success-circle">
            <i class="fa-solid fa-check"></i>
        </div>
    </div>

    <script>
    // ===== OTP Input Logic =====
    const otpDigits = document.querySelectorAll('.otp-digit');
    const errorMsg = document.getElementById('error-msg');

    // Show phone number
    const storedPhone = localStorage.getItem('phone');
    if (storedPhone) {
        const masked = storedPhone.slice(0, 4) + '****' + storedPhone.slice(-3);
        document.getElementById('phone-display').textContent = masked;
    }

    // Auto-focus first input
    otpDigits[0].focus();

    otpDigits.forEach((input, idx) => {
        input.addEventListener('input', (e) => {
            const val = e.target.value;
            // Only allow digits
            e.target.value = val.replace(/[^0-9]/g, '');
            
            if (e.target.value && idx < 5) {
                otpDigits[idx + 1].focus();
            }
            
            // Toggle filled class
            if (e.target.value) {
                e.target.classList.add('filled');
                e.target.classList.remove('error');
            } else {
                e.target.classList.remove('filled');
            }

            // Clear error
            hideError();

            // Auto-verify when all 6 digits are filled
            const otp = getOtpValue();
            if (otp.length === 6) {
                verifyOtp();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                otpDigits[idx - 1].focus();
                otpDigits[idx - 1].value = '';
                otpDigits[idx - 1].classList.remove('filled');
            }
        });

        // Handle paste
        input.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
            pasted.split('').forEach((char, i) => {
                if (otpDigits[i]) {
                    otpDigits[i].value = char;
                    otpDigits[i].classList.add('filled');
                }
            });
            if (pasted.length === 6) {
                otpDigits[5].focus();
                verifyOtp();
            } else if (pasted.length > 0) {
                otpDigits[Math.min(pasted.length, 5)].focus();
            }
        });

        // Focus animation
        input.addEventListener('focus', () => {
            input.parentElement.classList.add('focused');
        });
        input.addEventListener('blur', () => {
            input.parentElement.classList.remove('focused');
        });
    });

    function getOtpValue() {
        return Array.from(otpDigits).map(d => d.value).join('');
    }

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        otpDigits.forEach(d => d.classList.add('error'));
    }

    function hideError() {
        errorMsg.classList.remove('visible');
        otpDigits.forEach(d => d.classList.remove('error'));
    }

    // ===== Resend Timer =====
    let resendSeconds = 30;
    const resendLink = document.getElementById('resend-link');
    const resendTimer = document.getElementById('resend-timer');

    function toBengaliNum(n) {
        const bn = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
        return String(n).split('').map(d => bn[parseInt(d)] || d).join('');
    }

    function startResendTimer() {
        resendSeconds = 30;
        resendLink.classList.add('disabled');
        resendTimer.style.display = 'inline';
        
        const interval = setInterval(() => {
            resendSeconds--;
            const mins = String(Math.floor(resendSeconds / 60)).padStart(2, '0');
            const secs = String(resendSeconds % 60).padStart(2, '0');
            resendTimer.textContent = `(${toBengaliNum(mins)}:${toBengaliNum(secs)})`;
            
            if (resendSeconds <= 0) {
                clearInterval(interval);
                resendLink.classList.remove('disabled');
                resendTimer.style.display = 'none';
            }
        }, 1000);
    }

    startResendTimer();

    async function resendOtp() {
        const phone = localStorage.getItem('phone');
        if (!phone) return;

        resendLink.textContent = 'পাঠানো হচ্ছে...';
        
        try {
            const res = await fetch('send_otp.php', {
                method: 'POST',
                body: new URLSearchParams({ user_mobile: phone })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('ref', data.referenceNo);
                resendLink.textContent = 'আবার পাঠান';
                startResendTimer();
            } else {
                resendLink.textContent = 'আবার পাঠান';
                showError(data.message || 'পাঠাতে ব্যর্থ');
            }
        } catch(e) {
            resendLink.textContent = 'আবার পাঠান';
            showError('নেটওয়ার্ক সমস্যা');
        }
    }

    // ===== Verify OTP =====
    async function verifyOtp() {
        const otp = getOtpValue();

        if (otp.length < 6) {
            showError('অনুগ্রহ করে ৬ ডিজিটের কোড দিন');
            return;
        }

        const phone = localStorage.getItem('phone');
        const ref = localStorage.getItem('ref');
        const btn = document.getElementById('auth-btn');
        const loader = document.getElementById('loader');

        btn.disabled = true;
        loader.classList.add('visible');
        hideError();

        try {
            const res = await fetch('/auth/verify_otp.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    Otp: otp,
                    referenceNo: ref,
                    user_mobile: phone
                })
            });

            const data = await res.json();

            if (data.statusCode === 'S1000') {
                localStorage.setItem('isLoggedIn', true);
                // Show success animation
                const overlay = document.getElementById('success-overlay');
                overlay.classList.add('visible');
                setTimeout(() => {
                    if (!localStorage.getItem('29card_profile')) {
                        window.location.href = "name_setup.html";
                    } else {
                        window.location.href = "../index.html";
                    }
                }, 1200);
            } else {
                showError(data.message || 'OTP ভুল হয়েছে, আবার চেষ্টা করুন');
                otpDigits.forEach(d => {
                    d.value = '';
                    d.classList.remove('filled');
                });
                otpDigits[0].focus();
            }
        } catch(e) {
            console.error('OTP verification error:', e);
            if (e.message && e.message.includes('Failed to fetch')) {
                showError('ইন্টারনেট সমস্যা। AdBlocker/VPN বন্ধ করুন।');
            } else {
                showError('নেটওয়ার্ক ত্রুটি: ' + e.message);
            }
        } finally {
            btn.disabled = false;
            loader.classList.remove('visible');
        }
    }
    </script>
</body>
</html>
